<script>
const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const THAI_MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function toBE(year) { return year + 543; }

function formatThaiDateShort(d) {
  return `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]} ${toBE(d.getFullYear())}`;
}

function formatThaiMonthLabel(d) {
  return `${THAI_MONTHS[d.getMonth()]} <span class="y">${toBE(d.getFullYear())}</span>`;
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function isoDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Build the dispense schedule
// Inputs: startDate (Date of Day 1), days (number of doses), dose (mL), vialSize (mL), orderTime ('before'|'after')
// Returns: array of {date, type, vials, sub} for each day in the regimen + dispensing
function buildSchedule(startDate, days, dose, vialSize, orderTime) {
  // Each dose day: dose at 14:00. Cart at 15:00 sends vials for NEXT day's dose.
  // First dose day (Day 1):
  //   - if before 14:00: STAT today for today's dose + cart today for tomorrow
  //   - if after 14:00: today is "Day 0" (no patient activity), cart today for tomorrow (which is Day 1)

  // For simplicity, let's treat startDate as the first DOSE day.
  // If orderTime='before' → first dispense day = startDate (STAT + cart for next day's dose)
  // If orderTime='after' → first dispense day = day BEFORE startDate (just cart for startDate's dose)

  // Schedule will include: dispense events with dates.
  // Output: map of date -> {vials, type, sub}

  const events = []; // array of {date, type: 'stat'|'cart'|'last', vials, sub}
  let leftover = 0;

  if (orderTime === 'before') {
    // Day 1 (startDate): STAT for today's dose + cart for tomorrow
    // STAT: ceil(dose / vialSize) vials
    const statVials = Math.ceil(dose / vialSize);
    leftover = statVials * vialSize - dose;

    // Cart on Day 1 for Day 2 (only if there are more doses)
    if (days > 1) {
      const needed = Math.max(0, dose - leftover);
      const cartVials = Math.ceil(needed / vialSize);
      const totalToday = statVials + cartVials;
      events.push({
        date: new Date(startDate),
        type: 'stat',
        vials: totalToday,
        statVials: statVials,
        cartVials: cartVials,
        sub: `STAT ${statVials} + รถ ${cartVials}`
      });
      // Update leftover after Day 2's dose
      leftover = leftover + cartVials * vialSize - dose;
    } else {
      // Only 1 dose total, just STAT
      events.push({
        date: new Date(startDate),
        type: 'stat',
        vials: statVials,
        statVials: statVials,
        cartVials: 0,
        sub: `STAT ${statVials}`
      });
    }

    // Days 2 to days-1: cart for next day's dose. Last cart on day (days-1) for day (days)'s dose.
    for (let i = 1; i < days - 1; i++) {
      const dispDate = addDays(startDate, i);
      const needed = Math.max(0, dose - leftover);
      const cartVials = Math.ceil(needed / vialSize);
      events.push({
        date: dispDate,
        type: cartVials >= 2 ? 'refill' : 'normal',
        vials: cartVials,
        sub: null
      });
      leftover = leftover + cartVials * vialSize - dose;
    }

    // Last dose day (days): no dispense
    if (days > 1) {
      events.push({
        date: addDays(startDate, days - 1),
        type: 'last',
        vials: 0,
        sub: 'dose สุดท้าย'
      });
    }
  } else {
    // orderTime === 'after'
    // Day 0 (startDate - 1, or treat startDate as "day before first dose"):
    // No, let's interpret: startDate is the first DOSE day.
    // After 14:00 → no STAT, just cart starting (startDate - 1)... but that's awkward.
    // Better: after 14:00 means the cart on startDate evening will be the cart for startDate+1's dose, and there's no dose at startDate (the patient missed today's dose).
    //
    // Cleanest interpretation: startDate is "วันสั่งยา". If before 14:00, first dose is today. If after 14:00, first dose is tomorrow.
    // So for 'after': first dose date = startDate + 1, last dose = startDate + days
    // Dispensing on startDate (day of order) = cart for tomorrow's first dose
    // Dispensing on startDate+1 = cart for startDate+2's dose, etc.
    // Last dispense = day (days-1) of regimen, for last dose day.
    // Last dose day = no dispense.

    leftover = 0;

    // Day 0 (order day): cart for first dose
    const needed0 = dose; // no leftover
    const cart0 = Math.ceil(needed0 / vialSize);
    events.push({
      date: new Date(startDate),
      type: cart0 >= 2 ? 'refill' : 'normal',
      vials: cart0,
      sub: null
    });
    leftover = cart0 * vialSize - dose;

    // Subsequent dispense days
    for (let i = 1; i < days; i++) {
      const dispDate = addDays(startDate, i);
      const needed = Math.max(0, dose - leftover);
      const cartVials = Math.ceil(needed / vialSize);
      events.push({
        date: dispDate,
        type: cartVials >= 2 ? 'refill' : 'normal',
        vials: cartVials,
        sub: null
      });
      leftover = leftover + cartVials * vialSize - dose;
    }

    // Last dose day = startDate + days
    events.push({
      date: addDays(startDate, days),
      type: 'last',
      vials: 0,
      sub: 'dose สุดท้าย'
    });
  }

  return events;
}

// Render the calendar grid showing ONLY weeks that contain regimen days
function renderCalendar(events, startDate) {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Find date range of events
  const eventTimes = events.map(e => e.date.getTime());
  const minDate = new Date(Math.min(...eventTimes));
  const maxDate = new Date(Math.max(...eventTimes));

  // Get start of week (Monday) containing minDate
  const startCell = new Date(minDate);
  startCell.setHours(0, 0, 0, 0);
  const startDow = (startCell.getDay() + 6) % 7;
  startCell.setDate(startCell.getDate() - startDow);

  // Get end of week (Sunday) containing maxDate
  const endCell = new Date(maxDate);
  endCell.setHours(0, 0, 0, 0);
  const endDow = (endCell.getDay() + 6) % 7;
  endCell.setDate(endCell.getDate() + (6 - endDow));

  // Build event map
  const eventMap = {};
  events.forEach(e => {
    eventMap[isoDateKey(e.date)] = e;
  });

  // Iterate days from startCell to endCell
  const totalDays = Math.round((endCell.getTime() - startCell.getTime()) / 86400000) + 1;

  for (let i = 0; i < totalDays; i++) {
    const cellDate = new Date(startCell);
    cellDate.setDate(startCell.getDate() + i);

    const cell = document.createElement('div');
    cell.className = 'day';
    const key = isoDateKey(cellDate);
    const evt = eventMap[key];

    if (!evt) {
      cell.classList.add('e');
      cell.innerHTML = `<div class="d"><span>${cellDate.getDate()}</span></div>`;
      grid.appendChild(cell);
      continue;
    }

    let cls = 'n';
    let tagHTML = '';
    let body = '';

    if (evt.type === 'stat') {
      cls = 's';
      tagHTML = '<span class="tag">STAT</span>';
      const vialCount = evt.vials;
      let vialsSvg = '';
      for (let k = 0; k < vialCount; k++) {
        vialsSvg += '<svg width="20" height="26"><use href="#v"/></svg>';
      }
      body = `<div class="v">${vialsSvg}</div>`;
    } else if (evt.type === 'refill') {
      cls = 'r';
      body = `<div class="v"><svg width="22" height="29"><use href="#v"/></svg><svg width="22" height="29"><use href="#v"/></svg></div>`;
    } else if (evt.type === 'last') {
      cls = 'l';
      body = `<div class="v"><div class="last-marker"><i class="ti ti-circle-check-filled"></i><span>วันสุดท้าย</span></div></div>`;
    } else {
      cls = 'n';
      body = `<div class="v"><svg width="26" height="34"><use href="#v"/></svg></div>`;
    }

    cell.classList.add(cls);
    cell.innerHTML = `<div class="d"><span>${cellDate.getDate()}</span>${tagHTML}</div>${body}`;
    grid.appendChild(cell);
  }

  // Return range for month label
  return { startCell, endCell };
}

function updateSummary(events, drugName, dose, vialSize, startDate, days, orderTime, range) {
  // Total vials
  const totalVials = events.reduce((s, e) => s + (e.vials || 0), 0);
  // Refill days (excl. STAT and last)
  const refillEvents = events.filter(e => e.type === 'refill');
  const refillDates = refillEvents.map(e => `${e.date.getDate()}`).join(', ');
  const monthShort = THAI_MONTHS_SHORT[startDate.getMonth()];

  // Today (= first dispensing event, which is the order day for both modes)
  const todayEvt = events[0];

  // Title
  document.getElementById('titleEl').textContent = drugName;
  document.getElementById('subtitleEl').textContent = `${dose} mL/วัน  ·  ขวด ${vialSize} mL  ·  ฉีด 14:00 น.  ·  รถยา 15:00`;

  // Start date stat
  const startEl = document.getElementById('startVal');
  const sd = startDate;
  startEl.innerHTML = `${sd.getDate()} ${THAI_MONTHS_SHORT[sd.getMonth()]} <span class="alt">${toBE(sd.getFullYear())}</span>`;

  // Today's dispense
  document.getElementById('todayVal').textContent = `${todayEvt.vials} ขวด`;
  document.getElementById('todaySub').textContent = todayEvt.sub || 'รถยา';

  // Total
  document.getElementById('totalVal').innerHTML = `${totalVials} ขวด <span class="alt">· ${days} วัน</span>`;

  // Month label - handle multi-month range
  const rangeStart = range ? range.startCell : sd;
  const rangeEnd = range ? range.endCell : sd;
  let monthLabelHTML;
  if (rangeStart.getMonth() === rangeEnd.getMonth() && rangeStart.getFullYear() === rangeEnd.getFullYear()) {
    monthLabelHTML = `${THAI_MONTHS[rangeStart.getMonth()]} <span class="y">${toBE(rangeStart.getFullYear())}</span>`;
  } else if (rangeStart.getFullYear() === rangeEnd.getFullYear()) {
    monthLabelHTML = `${THAI_MONTHS[rangeStart.getMonth()]} – ${THAI_MONTHS[rangeEnd.getMonth()]} <span class="y">${toBE(rangeStart.getFullYear())}</span>`;
  } else {
    monthLabelHTML = `${THAI_MONTHS[rangeStart.getMonth()]} ${toBE(rangeStart.getFullYear())} – ${THAI_MONTHS[rangeEnd.getMonth()]} ${toBE(rangeEnd.getFullYear())}`;
  }
  document.getElementById('monthLabel').innerHTML = monthLabelHTML;

  // Refill dates
  if (refillDates) {
    document.getElementById('refillDates').textContent = `${refillDates} ${monthShort} · ${refillEvents.length} วัน`;
  } else {
    document.getElementById('refillDates').textContent = 'ไม่มี';
  }

  // Meta tag
  document.getElementById('metaTag').textContent = `${drugName.substring(0,3).toLowerCase()} · ${days}d · ${totalVials}v`;
}

function recalc() {
  const drugName = document.getElementById('drugName').value || 'amikacin';
  const dose = parseFloat(document.getElementById('dose').value) || 2.7;
  const vialSize = parseFloat(document.getElementById('vialSize').value) || 2;
  const days = parseInt(document.getElementById('days').value) || 14;
  const startStr = document.getElementById('startDate').value;
  const orderTime = document.querySelector('input[name="ordertime"]:checked').value;

  let startDate;
  if (startStr) {
    const [y, m, d] = startStr.split('-').map(Number);
    startDate = new Date(y, m - 1, d);
  } else {
    startDate = new Date();
  }

  const events = buildSchedule(startDate, days, dose, vialSize, orderTime);
  const range = renderCalendar(events, startDate);
  updateSummary(events, drugName, dose, vialSize, startDate, days, orderTime, range);
}

// Setup radio button active state
document.querySelectorAll('.field-radio input').forEach(input => {
  input.addEventListener('change', () => {
    document.querySelectorAll('.field-radio label').forEach(l => l.classList.remove('active'));
    input.parentElement.classList.add('active');
    recalc();
  });
});

// Setup field listeners
['drugName', 'dose', 'vialSize', 'startDate', 'days'].forEach(id => {
  document.getElementById(id).addEventListener('input', recalc);
});

// Initialize default start date to today, then recalc
(function init() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('startDate').value = `${yyyy}-${mm}-${dd}`;
  recalc();
})();
</script>
